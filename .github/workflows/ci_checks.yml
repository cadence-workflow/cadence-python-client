name: CI Checks
on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: |
          uv sync --extra dev
      - name: Ensure Proto Files changes are committed
        run: |
          uv run python scripts/generate_proto.py
          if [ -n "$(git status --porcelain  2>&1)" ]; then
            echo "There are file changes after generating proto files."
            echo "Please run this command and commit the changes:"
            echo "\tuv run python scripts/generate_proto.py"
            git status --porcelain
            git --no-pager diff
            exit 1
          fi
      - name: Run Ruff linter
        run: |
          uv tool run ruff check
          uv tool run ruff format --check

  type-check:
    name: Type Safety Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: |
          uv sync --extra dev --extra openai
      - name: Run mypy type checker
        run: |
          uv run mypy cadence/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: |
          uv sync --extra dev
      - name: Run unit tests
        run: |
          uv run pytest --cov --cov-branch --cov-report=xml
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: cadence-workflow/cadence-python-client

  integration_test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: |
          uv sync --extra dev
      - name: Run unit tests
        run: |
          uv run pytest -v --integration-tests
